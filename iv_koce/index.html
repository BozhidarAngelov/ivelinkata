<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HR Dashboard — iv_koce</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ── TOP NAVBAR ─────────────────────────────────────── -->
<nav class="navbar">
    <div class="navbar-brand">
        <i class="fa-solid fa-chart-network"></i>
        <span>HR Dashboard</span>
    </div>
    <div class="navbar-center">
        <div class="navbar-stat">
            <span class="stat-val" id="resultsCount">0</span>
            <span class="stat-lbl">employees</span>
        </div>
    </div>
    <div class="navbar-actions">
        <button id="btnAdd"   class="btn btn-add"><i class="fa-solid fa-user-plus"></i> Add</button>
        <button id="btnExcel" class="btn btn-excel"><i class="fa-solid fa-file-excel"></i> Export</button>
    </div>
</nav>

<!-- ── FILTER BAR ─────────────────────────────────────── -->
<div class="filter-bar">
    <div class="filter-bar-inner">
        <div class="fbar-group">
            <i class="fa-solid fa-magnifying-glass fbar-icon"></i>
            <input type="text" id="filterName" placeholder="Search name…">
        </div>
        <div class="fbar-group">
            <i class="fa-solid fa-briefcase fbar-icon"></i>
            <input type="text" id="filterJob" placeholder="Job title…">
        </div>
        <div class="fbar-group">
            <i class="fa-solid fa-building fbar-icon"></i>
            <select id="filterDept">
                <option value="">All Departments</option>
            </select>
        </div>
        <div class="fbar-group fbar-salary">
            <i class="fa-solid fa-coins fbar-icon"></i>
            <div class="fbar-salary-inner">
                <span class="fbar-salary-lbl">≤ <span id="salaryLabel">any</span></span>
                <input type="range" id="filterSalary" min="0" max="100000" step="1000" value="100000">
            </div>
        </div>
        <div class="fbar-group">
            <i class="fa-solid fa-location-dot fbar-icon"></i>
            <input type="text" id="filterAddress" placeholder="Address…">
        </div>
        <div class="fbar-group">
            <i class="fa-solid fa-city fbar-icon"></i>
            <select id="filterTown">
                <option value="">All Towns</option>
            </select>
        </div>
        <div class="fbar-btns">
            <button id="btnSearch" class="btn btn-search"><i class="fa-solid fa-magnifying-glass"></i> Search</button>
            <button id="btnClear"  class="btn btn-clear"><i class="fa-solid fa-xmark"></i></button>
        </div>
    </div>
</div>

<!-- ── TABLE CARD ─────────────────────────────────────── -->
<div class="page-body">
    <div class="table-card">
        <div class="table-wrap">
            <table id="mainTable">
                <thead>
                    <tr>
                        <th class="col-num">N°</th>
                        <th class="col-name sortable" data-col="name">
                            Full Name
                            <span class="sort-icon" id="sortName"><i class="fa-solid fa-sort"></i></span>
                        </th>
                        <th class="col-job">Job Title</th>
                        <th class="col-dept">D. Name</th>
                        <th class="col-salary">Salary</th>
                        <th class="col-addr sortable" data-col="address">
                            Address
                            <span class="sort-icon" id="sortAddr"><i class="fa-solid fa-sort"></i></span>
                        </th>
                        <th class="col-town">Town</th>
                        <th class="col-action">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <tr id="noDataRow">
                        <td colspan="8" class="no-data">No employees found</td>
                    </tr>
                </tbody>
            </table>
        </div>
        <div class="pagination" id="pagination"></div>
    </div>
</div>

<!-- ═══ ADD MODAL ═══ -->
<div class="modal-overlay" id="addModal">
    <div class="modal-box">
        <div class="modal-header">
            <h3><i class="fa-solid fa-user-plus"></i> Add Employee</h3>
            <button class="modal-close" data-modal="addModal">&times;</button>
        </div>
        <form id="addForm">
            <div class="form-grid">
                <div class="form-group">
                    <label>First Name <span class="req">*</span></label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name <span class="req">*</span></label>
                    <input type="text" name="last_name" required>
                </div>
                <div class="form-group">
                    <label>Middle Name</label>
                    <input type="text" name="middle_name" placeholder="optional">
                </div>
                <div class="form-group">
                    <label>Job Title <span class="req">*</span></label>
                    <input type="text" name="job_title" required>
                </div>
                <div class="form-group">
                    <label>Department <span class="req">*</span></label>
                    <select name="department_id" required id="addDeptSelect">
                        <option value="">Select department…</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Salary <span class="req">*</span></label>
                    <input type="number" name="salary" min="0" step="0.01" required>
                </div>
                <div class="form-group full-width">
                    <label>Address <span class="req">*</span></label>
                    <input type="text" name="address_text" required>
                </div>
                <div class="form-group full-width">
                    <label>Town <span class="req">*</span></label>
                    <select name="town_id" required id="addTownSelect">
                        <option value="">Select town…</option>
                    </select>
                </div>
            </div>
            <p class="form-error" id="addError"></p>
            <div class="form-actions">
                <button type="submit" class="btn btn-add">Add Employee</button>
                <button type="button" class="btn btn-clear" data-modal="addModal">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- ═══ EDIT MODAL ═══ -->
<div class="modal-overlay" id="editModal">
    <div class="modal-box">
        <div class="modal-header">
            <h3><i class="fa-solid fa-user-pen"></i> Edit Employee</h3>
            <button class="modal-close" data-modal="editModal">&times;</button>
        </div>
        <form id="editForm">
            <input type="hidden" name="employee_id">
            <input type="hidden" name="address_id">
            <div class="form-grid">
                <div class="form-group">
                    <label>First Name <span class="req">*</span></label>
                    <input type="text" name="first_name" required>
                </div>
                <div class="form-group">
                    <label>Last Name <span class="req">*</span></label>
                    <input type="text" name="last_name" required>
                </div>
                <div class="form-group">
                    <label>Middle Name</label>
                    <input type="text" name="middle_name" placeholder="optional">
                </div>
                <div class="form-group">
                    <label>Job Title <span class="req">*</span></label>
                    <input type="text" name="job_title" required>
                </div>
                <div class="form-group">
                    <label>Department <span class="req">*</span></label>
                    <select name="department_id" required id="editDeptSelect">
                        <option value="">Select department…</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Salary <span class="req">*</span></label>
                    <input type="number" name="salary" min="0" step="0.01" required>
                </div>
                <div class="form-group full-width">
                    <label>Address <span class="req">*</span></label>
                    <input type="text" name="address_text" required>
                </div>
                <div class="form-group full-width">
                    <label>Town <span class="req">*</span></label>
                    <select name="town_id" required id="editTownSelect">
                        <option value="">Select town…</option>
                    </select>
                </div>
            </div>
            <p class="form-error" id="editError"></p>
            <div class="form-actions">
                <button type="submit" class="btn btn-search">Save Changes</button>
                <button type="button" class="btn btn-clear" data-modal="editModal">Cancel</button>
            </div>
        </form>
    </div>
</div>

<!-- ═══ DELETE MODAL ═══ -->
<div class="modal-overlay" id="deleteModal">
    <div class="modal-box modal-box--sm">
        <div class="modal-header">
            <h3><i class="fa-solid fa-triangle-exclamation"></i> Confirm Delete</h3>
            <button class="modal-close" data-modal="deleteModal">&times;</button>
        </div>
        <p class="delete-msg">Are you sure you want to delete <strong id="deleteEmpName"></strong>?</p>
        <div class="form-actions">
            <button id="btnConfirmDelete" class="btn btn-delete">Yes, Delete</button>
            <button class="btn btn-clear" data-modal="deleteModal">Cancel</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<script src="script.js"></script>
</body>
</html>
